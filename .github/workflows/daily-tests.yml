      - name: Generate HTML email summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, html

          summary = {"passed":0, "failed":0, "broken":0, "skipped":0}
          failed_rows = []

          for f in os.listdir("allure-results"):
              if f.endswith("-result.json"):
                  with open(os.path.join("allure-results", f)) as file:
                      data = json.load(file)

                  name = data.get("name", "N/A")
                  full = data.get("fullName", "")
                  status = data.get("status", "unknown")
                  summary[status] = summary.get(status, 0) + 1

                  # 🔴 Extract failure reason
                  if status in ("failed", "broken"):
                      status_details = data.get("statusDetails", {})
                      message = status_details.get("message", "")
                      trace = status_details.get("trace", "")

                      error_text = html.escape(message or trace[:800] or "No details")

                      failed_rows.append(f"""
                      <tr>
                        <td>{name}</td>
                        <td>{full}</td>
                        <td style="color:red;font-weight:bold">{status.upper()}</td>
                        <td><pre style="white-space:pre-wrap">{error_text}</pre></td>
                      </tr>
                      """)

          total = sum(summary.values())

          html_content = f"""
          <h2>🧪 Daily API Test Report</h2>

          <table border="1" cellpadding="8" cellspacing="0">
            <tr style="background:#f0f0f0">
              <th>Passed</th>
              <th>Failed</th>
              <th>Broken</th>
              <th>Skipped</th>
              <th>Total</th>
            </tr>
            <tr align="center">
              <td style="color:green">{summary['passed']}</td>
              <td style="color:red">{summary['failed']}</td>
              <td style="color:orange">{summary['broken']}</td>
              <td>{summary['skipped']}</td>
              <td><b>{total}</b></td>
            </tr>
          </table>

          <br>

          <h3>❌ Failed / Broken Testcases</h3>
          <table border="1" cellpadding="6" cellspacing="0" width="100%">
            <tr style="background:#f7f7f7">
              <th>Test Name</th>
              <th>Path</th>
              <th>Status</th>
              <th>Failure Reason</th>
            </tr>
            {''.join(failed_rows) if failed_rows else "<tr><td colspan='4'>No failures 🎉</td></tr>"}
          </table>

          <br>
          <p>
            🔗 <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
            View GitHub Action Run
            </a>
          </p>
          """

          open("email.html", "w").write(html_content)
          EOF


