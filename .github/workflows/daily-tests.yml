name: Daily API Tests

on:
  schedule:
    - cron: "0 7 * * *"   # 12:30 PM IST
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest pytest-html

#      - name: Run Pytest with Allure
#        run: |
#          pytest -v --alluredir=allure-results
#          echo "Allure results count:"
#          ls allure-results | wc -l

      - name: Run Pytest with Allure & HTML
        run: |
          pytest -v \
            --alluredir=allure-results \
            --html=pytest-report.html \
            --self-contained-html

      # ✅ Install Allure CLI (NO Docker)
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version
      

      # ✅ Always clean old report
      - name: Clean Allure report
        run: rm -rf allure-report

      # ✅ Generate report safely
      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean
          echo "Allure report items:"
          ls allure-report | wc -l

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


