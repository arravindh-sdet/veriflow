<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriFlow Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5ef;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --text: #172033;
      --muted: #5f6b7a;
      --danger: #b42318;
      --success: #027a48;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 34%),
        linear-gradient(180deg, #f8faf7 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(92vw, 420px);
      background: var(--panel);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(23, 32, 51, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .status {
      min-height: 24px;
      margin-top: 18px;
      font-weight: 600;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 data-testid="hero-title">VeriFlow Demo Login</h1>
    <p>Simple local UI used to validate the Playwright wiring in this framework.</p>

    <label for="email">Email</label>
    <input id="email" data-testid="email" type="email" placeholder="name@example.com">

    <label for="password">Password</label>
    <input id="password" data-testid="password" type="password" placeholder="Enter password">

    <button data-testid="sign-in" type="button">Sign In</button>
    <div class="status" data-testid="status" aria-live="polite"></div>
  </main>

  <script>
    const emailInput = document.querySelector("[data-testid='email']");
    const passwordInput = document.querySelector("[data-testid='password']");
    const signInButton = document.querySelector("[data-testid='sign-in']");
    const statusMessage = document.querySelector("[data-testid='status']");

    signInButton.addEventListener("click", () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        statusMessage.textContent = "Email and password are required.";
        statusMessage.className = "status error";
        return;
      }

      statusMessage.textContent = `Welcome, ${email}`;
      statusMessage.className = "status success";
    });
  </script>
</body>
</html>
